<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Başarı Akademi - Öğrenci Takip</title>
  <script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #eef3f9;
      --surface: #ffffff;
      --line: #d4dfed;
      --text: #07162f;
      --muted: #8897b5;
      --primary: #c5162b;
      --primary-dark: #111827;
      --blue: #38bdf8;
      --orange: #ff8b38;
      --green: #009a70;
      --red: #c84e4e;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { display: grid; grid-template-columns: 276px 1fr; min-height: 100vh; }
    .sidebar { position: sticky; top: 0; height: 100vh; background: #fff; border-right: 1px solid var(--line); padding: 18px 14px; overflow: auto; }
    .brand { display: flex; align-items: center; gap: 13px; padding: 2px 2px 18px; }
    .brand-logo { width: 54px; height: 54px; object-fit: contain; border-radius: 12px; background: #fff; border: 1px solid var(--line); }
    .brand strong { display: block; font-size: 17px; letter-spacing: .10em; }
    .brand small { display: block; color: var(--muted); font-weight: 800; letter-spacing: .18em; margin-top: 2px; }
    .side-title { font-size: 11px; color: #9aa8c1; margin: 24px 0 9px; text-transform: uppercase; font-weight: 900; letter-spacing: .16em; }
    .nav { display: grid; gap: 7px; }
    .nav button { width: 100%; border: 1px solid transparent; background: transparent; border-radius: 8px; padding: 12px 10px; text-align: left; font-weight: 750; color: #22324d; }
    .nav button.active { background: #fff0f2; border-color: #f3cbd1; color: var(--primary); }
    .main { min-width: 0; }
    .topbar { position: sticky; top: 0; z-index: 5; min-height: 62px; background: #fff; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 8px 30px; }
    .topbar strong { font-size: 20px; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .search { height: 40px; width: min(280px, 28vw); min-width: 190px; display: flex; align-items: center; gap: 8px; border: 1px solid #c6d3e4; background: #eef3fa; border-radius: 8px; padding: 0 12px; }
    .search input { border: 0; outline: 0; background: transparent; width: 100%; }
    .btn { border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--text); padding: 10px 12px; min-height: 40px; font-weight: 850; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
    .btn.dark { background: var(--primary-dark); border-color: var(--primary-dark); color: white; }
    .btn.danger { color: var(--red); border-color: #efcaca; }
    .page { padding: 32px; }
    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(220px, 1fr)); }
    .grid.five { grid-template-columns: repeat(5, minmax(170px, 1fr)); }
    .panel, .stat, .section { background: #fff; border: 1px solid var(--line); border-radius: 12px; }
    .panel, .section { padding: 20px; }
    .stat { padding: 22px; min-height: 150px; display: grid; align-content: space-between; position: relative; overflow: hidden; }
    .stat:after { content: ""; position: absolute; right: -18px; top: -28px; width: 88px; height: 96px; border-radius: 999px; background: var(--blob, #eef2ff); }
    .stat span, .stat strong, .stat small { position: relative; z-index: 1; }
    .stat strong { font-size: 30px; }
    .stat small { color: var(--muted); }
    .section-toolbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 240px)); gap: 16px; }
    .student-card { background: #e7edf5; border: 1px solid #d4dfed; border-top: 3px solid var(--card, #38bdf8); border-radius: 14px; padding: 22px 20px; min-height: 294px; display: grid; gap: 16px; cursor: pointer; transition: transform .16s ease, box-shadow .16s ease; }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 16px 24px rgba(30, 52, 95, .12); }
    .card-top { display: flex; justify-content: space-between; gap: 12px; }
    .avatar { width: 54px; height: 54px; border-radius: 14px; background: var(--card, #38bdf8); color: white; display: grid; place-items: center; font-size: 21px; font-weight: 900; }
    .pill { background: #c9f1e8; color: #008d62; font-size: 12px; font-weight: 900; border-radius: 999px; padding: 4px 11px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .mini { background: white; border-radius: 8px; padding: 10px 11px; min-height: 58px; }
    .mini strong { display: block; color: #009a70; }
    .mini.orange strong { color: #e37000; }
    .mini.dark strong { color: #07162f; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .table-wrap { overflow: auto; }
    .badge { border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 900; background: #eef3f5; color: var(--muted); }
    .good { background: #e5f4eb; color: #008d62; }
    .warn { background: #fff4df; color: #c47a00; }
    .bad { background: #fdebec; color: #c84e4e; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .wide { grid-column: span 2; }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 900; }
    .field input, .field select, .field textarea { border: 1px solid var(--line); border-radius: 8px; padding: 11px; background: #fff; min-height: 42px; width: 100%; }
    textarea { min-height: 96px; resize: vertical; }
    .chart-box { position: relative; height: 280px; min-height: 280px; max-height: 280px; width: 100%; overflow: hidden; }
    .chart-box canvas { display: block; width: 100% !important; height: 100% !important; max-height: 280px !important; }
    .chart { display: block; width: 100% !important; height: 100% !important; max-height: 280px !important; }
    .student-card.archived { opacity: .72; filter: grayscale(.35); }
    .modal { position: fixed; inset: 0; background: rgba(12, 20, 28, .42); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 50; }
    .modal.open { display: flex; }
    .modal-box { width: min(900px, 100%); max-height: 88vh; overflow: auto; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .mobile-menu { display: none; }
    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; z-index: 20; transform: translateX(-100%); transition: .2s; width: min(310px, 88vw); }
      .sidebar.open { transform: translateX(0); }
      .mobile-menu { display: inline-flex; }
      .grid.five, .grid.four, .grid.three, .grid.two { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .page { padding: 18px; }
      .search { display: none; }
    }
    @media (max-width: 680px) {
      .grid.five, .grid.four, .grid.three, .grid.two, .form-grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .topbar { padding: 10px 14px; }
      .cards { grid-template-columns: 1fr; }
      .student-card { min-height: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="btn" onclick="closeModal()">Kapat</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  <script>
    const api = {
      async req(path, options = {}) {
        const res = await fetch(path, {
          ...options,
          headers: { "Content-Type": "application/json", ...(options.headers || {}) }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "İşlem tamamlanamadı.");
        return data;
      }
    };

    let state = { students: [], subjects: [], entries: [], exams: [], mistakes: [], notes: [], upcomingExams: [] };
    let activeStudentId = localStorage.getItem("activeStudentId") || "";
    let page = "dashboard";
    let contentEl = null;
    let charts = [];

    const colors = ["#38bdf8", "#4f83f1", "#ff8b38", "#32b8e8", "#c5162b"];
    const mistakeTypes = ["Bilgi eksikliği", "Dikkatsizlik", "İşlem hatası", "Konuyu karıştırma", "Süre yetişmedi", "Soruyu yanlış okuma", "Yorum hatası"];

    function today(offset = 0) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().slice(0, 10);
    }
    function fmt(n) { return Number(n || 0).toLocaleString("tr-TR"); }
    function net(c, w) { return +(Number(c) - Number(w) / 3).toFixed(2); }
    function examNet(e) { return +(e.details || []).reduce((s, d) => s + net(d.correct, d.wrong), 0).toFixed(2); }
    function initials(n) { return n.split(" ").map(x => x[0]).join("").slice(0, 2).toLocaleUpperCase("tr-TR"); }
    function entries(id = activeStudentId) { return state.entries.filter(e => e.studentId === id); }
    function exams(id = activeStudentId) { return state.exams.filter(e => e.studentId === id); }
    function mistakes(id = activeStudentId) { return state.mistakes.filter(e => e.studentId === id); }
    function notes(id = activeStudentId) { return state.notes.filter(e => e.studentId === id); }
    function activeStudents() { return state.students.filter(s => !s.archived); }
    function archivedStudents() { return state.students.filter(s => s.archived); }
    function student() { return state.students.find(s => s.id === activeStudentId) || state.students[0]; }
    function totalQuestions(id) { return entries(id).reduce((s, e) => s + Number(e.total), 0); }
    function totalStudyMinutes(id) { return entries(id).reduce((s, e) => s + Number(e.studyMinutes || 0), 0); }
    function formatDuration(minutes) {
      const h = Math.floor(Number(minutes || 0) / 60);
      const m = Number(minutes || 0) % 60;
      return h ? `${h} sa ${m} dk` : `${m} dk`;
    }
    function success(id) {
      const es = entries(id);
      const correct = es.reduce((s, e) => s + Number(e.correct), 0);
      const total = es.reduce((s, e) => s + Number(e.total), 0);
      return total ? Math.round(correct / total * 100) : 0;
    }
    function weekTotal(id) {
      const start = new Date();
      start.setDate(start.getDate() - start.getDay() + 1);
      return entries(id).filter(e => new Date(e.date + "T12:00") >= start).reduce((s, e) => s + Number(e.total), 0);
    }
    function weekStudyMinutes(id) {
      const start = new Date();
      start.setDate(start.getDate() - start.getDay() + 1);
      return entries(id).filter(e => new Date(e.date + "T12:00") >= start).reduce((s, e) => s + Number(e.studyMinutes || 0), 0);
    }
    function lastLabel(e) {
      if (!e) return "Yok";
      const diff = Math.floor((new Date(today() + "T12:00") - new Date(e.date + "T12:00")) / 86400000);
      return diff <= 0 ? "Bugün" : `${diff}g önce`;
    }
    function group(list, key, val = x => 1) {
      return list.reduce((a, x) => {
        a[x[key]] = (a[x[key]] || 0) + Number(val(x));
        return a;
      }, {});
    }

    async function load() {
      state = await api.req("/api/state");
      if (!activeStudentId || !state.students.some(s => s.id === activeStudentId) || state.students.find(s => s.id === activeStudentId)?.archived) {
        activeStudentId = activeStudents()[0]?.id || state.students[0]?.id || "";
      }
      localStorage.setItem("activeStudentId", activeStudentId);
      renderApp();
    }

    function renderApp() {
      document.getElementById("root").innerHTML = `
        <div class="app">
          <aside class="sidebar" id="sidebar">
            <div class="brand">
              <img src="/mg-logo.png" class="brand-logo" alt="MG logo">
              <div><strong>BAŞARI</strong><small>AKADEMİ</small></div>
            </div>
            <div class="side-title">Ana Menü</div>
            <nav class="nav">
              <button data-page="dashboard">📊 Ana Ekran</button>
              <button data-page="students">👥 Öğrenciler</button>
              <button data-page="student">👤 Öğrenci Takibi</button>
            </nav>
            <div class="side-title">Yönetim</div>
            <nav class="nav">
              <button data-page="subjects">📚 Ders & Konu</button>
              <button data-page="reports">📄 Raporlar</button>
              <button data-page="settings">⚙️ Ayarlar</button>
            </nav>
          </aside>
          <main class="main">
            <header class="topbar">
              <div class="actions">
                <button class="btn mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <div><strong id="title"></strong><div class="muted" id="subtitle"></div></div>
              </div>
              <div class="actions">
                <label class="search"><span>🔎</span><input oninput="filterCards(this.value)" placeholder="Öğrenci ara..."></label>
                <select id="topStudentSelect" class="btn" onchange="selectStudent(this.value)">${activeStudents().map(s => `<option value="${s.id}" ${s.id === activeStudentId ? "selected" : ""}>${s.name}</option>`).join("")}</select>
                <button class="btn primary" onclick="openStudentForm()">+ Öğrenci Ekle</button>
              </div>
            </header>
            <section class="page" id="content"></section>
          </main>
        </div>`;
      contentEl = document.getElementById("content");
      document.querySelector(".sidebar").onclick = e => {
        const btn = e.target.closest("[data-page]");
        if (!btn) return;
        page = btn.dataset.page;
        renderPage();
        document.getElementById("sidebar").classList.remove("open");
      };
      renderPage();
    }

    function setTitle(title, subtitle = "") {
      document.getElementById("title").textContent = title;
      document.getElementById("subtitle").textContent = subtitle;
      const topSelect = document.getElementById("topStudentSelect");
      if (topSelect) topSelect.value = activeStudentId;
      document.querySelectorAll("[data-page]").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
    }

    function renderPage() {
      charts.forEach(c => c.destroy?.());
      charts = [];
      const pages = { dashboard, students, entry, exams: examsPage, subjects, mistakes: mistakesPage, charts: chartsPage, reports, settings, student: studentPage };
      (pages[page] || dashboard)();
    }

    function dashboard() {
      setTitle("Ana Ekran", "Öğrenci takip ve akademik gelişim özeti");
      const active = activeStudents();
      const week = active.reduce((s, st) => s + weekTotal(st.id), 0);
      const todayQ = state.entries.filter(e => e.date === today()).reduce((s, e) => s + Number(e.total), 0);
      contentEl.innerHTML = `
        <div class="grid four">
          <div class="stat" style="--blob:#eef2ff"><span>👥</span><strong>${active.length}</strong><small>Aktif Öğrenci</small></div>
          <div class="stat" style="--blob:#f5ecff"><span>✏️</span><strong>${state.entries.filter(e => e.date === today()).length}</strong><small>Bugün Girilen Kayıt</small></div>
          <div class="stat" style="--blob:#eaf8f3"><span>📊</span><strong>${fmt(todayQ)}</strong><small>Bugün Toplam Soru</small></div>
          <div class="stat" style="--blob:#fff5e9"><span>📈</span><strong>${fmt(week)}</strong><small>Bu Hafta Toplam Soru</small></div>
        </div>
        <div class="section" style="margin-top:28px">
          <div class="section-toolbar"><div><b>👥 Öğrenciler</b><div class="muted">${active.length} aktif · ${archivedStudents().length} arşiv</div></div><button class="btn dark" onclick="page='student';renderPage()">Öğrenci Takibi</button></div>
          <div class="cards" id="cards">${active.map(card).join("")}</div>
        </div>`;
    }

    function card(s, i) {
      const recent = entries(s.id).sort((a, b) => b.date.localeCompare(a.date))[0];
      return `<article class="student-card ${s.archived ? "archived" : ""}" data-name="${s.name.toLowerCase()}" style="--card:${colors[i % colors.length]}" onclick="activeStudentId='${s.id}';localStorage.setItem('activeStudentId',activeStudentId);page='student';renderPage()">
        <div class="card-top"><div class="avatar">${initials(s.name)}</div><span class="pill">${s.archived ? "Arşiv" : "Aktif"}</span></div>
        <div><h3>${s.name}</h3><div class="muted">${s.className} · ${s.targetExam}</div></div>
        <div class="metric-grid">
          <div class="mini"><strong>${fmt(weekTotal(s.id))}</strong><small>Bu hafta</small></div>
          <div class="mini orange"><strong>${lastLabel(recent)}</strong><small>Son kayıt</small></div>
          <div class="mini dark"><strong>${fmt(totalQuestions(s.id))}</strong><small>Toplam soru</small></div>
          <div class="mini orange"><strong>%${success(s.id)}</strong><small>Başarı</small></div>
        </div>
      </article>`;
    }

    function filterCards(value) {
      document.querySelectorAll(".student-card").forEach(card => {
        card.style.display = card.dataset.name.includes(value.toLowerCase()) ? "" : "none";
      });
    }
    function selectStudent(id) {
      activeStudentId = id;
      localStorage.setItem("activeStudentId", activeStudentId);
      page = "student";
      renderPage();
    }

    function students() {
      setTitle("Öğrenciler", "Öğrenci bilgileri ve hedef yönetimi");
      const active = activeStudents();
      const archived = archivedStudents();
      contentEl.innerHTML = `
        <div class="section"><div class="section-toolbar"><div><b>Aktif Öğrenciler</b><div class="muted">${active.length} öğrenci</div></div></div><div class="cards">${active.map(card).join("")}</div></div>
        <div class="panel table-wrap" style="margin-top:18px">
          <table><thead><tr><th>Öğrenci</th><th>Hedef</th><th>Haftalık Hedef</th><th>Toplam Soru</th><th>Başarı</th><th>İşlem</th></tr></thead><tbody>
          ${active.map(s => `<tr><td><b>${s.name}</b><div class="muted">${s.className}</div></td><td>${s.targetExam}<div class="muted">${s.targetNet} net · ${s.targetScore} puan</div></td><td>${fmt(s.weeklyGoal)}</td><td>${fmt(totalQuestions(s.id))}</td><td><span class="badge good">%${success(s.id)}</span></td><td class="actions"><button class="btn" onclick="openStudentForm('${s.id}')">Düzenle</button><button class="btn" onclick="archiveStudent('${s.id}', true)">Arşive Al</button><button class="btn danger" onclick="deleteStudent('${s.id}')">Kalıcı Sil</button></td></tr>`).join("")}
          </tbody></table>
        </div>
        <div class="panel table-wrap" style="margin-top:18px">
          <h3>Arşivlenen Öğrenciler</h3>
          <table><thead><tr><th>Öğrenci</th><th>Hedef</th><th>Toplam Soru</th><th>Başarı</th><th>İşlem</th></tr></thead><tbody>
          ${archived.map(s => `<tr><td><b>${s.name}</b><div class="muted">${s.className}</div></td><td>${s.targetExam}</td><td>${fmt(totalQuestions(s.id))}</td><td><span class="badge">%${success(s.id)}</span></td><td class="actions"><button class="btn" onclick="archiveStudent('${s.id}', false)">Arşivden Çıkar</button><button class="btn" onclick="openStudentForm('${s.id}')">Düzenle</button><button class="btn danger" onclick="deleteStudent('${s.id}')">Kalıcı Sil</button></td></tr>`).join("") || `<tr><td colspan="5" class="muted">Arşivde öğrenci yok.</td></tr>`}
          </tbody></table>
        </div>`;
    }

    function studentPage() {
      const s = student();
      if (!s) return dashboard();
      setTitle(s.name, `${s.className} · ${s.targetExam}`);
      const last = exams().at(-1);
      const studentEntries = entries();
      const studentExams = exams();
      const studentMistakes = mistakes();
      contentEl.innerHTML = `
        <div class="panel" style="margin-bottom:18px">
          <div class="actions">
            <label class="field" style="min-width:260px;margin:0"><label>Öğrenci Seç</label><select onchange="selectStudent(this.value)">${activeStudents().map(st => `<option value="${st.id}" ${st.id === s.id ? "selected" : ""}>${st.name}</option>`).join("")}</select></label>
            <button class="btn" onclick="openStudentForm('${s.id}')">Öğrenci Bilgilerini Düzenle</button>
            <button class="btn" onclick="archiveStudent('${s.id}', ${!s.archived})">${s.archived ? "Arşivden Çıkar" : "Arşive Al"}</button>
            <button class="btn danger" onclick="deleteStudent('${s.id}')">Kalıcı Sil</button>
          </div>
        </div>
        <div class="grid five">
          <div class="stat"><strong>${fmt(totalQuestions(s.id))}</strong><small>Toplam soru</small></div>
          <div class="stat"><strong>${formatDuration(totalStudyMinutes(s.id))}</strong><small>Toplam çalışma</small></div>
          <div class="stat"><strong>%${success(s.id)}</strong><small>Başarı</small></div>
          <div class="stat"><strong>${last ? examNet(last) : 0}</strong><small>Son deneme neti</small></div>
          <div class="stat"><strong>${formatDuration(weekStudyMinutes(s.id))}</strong><small>Bu hafta çalışma</small></div>
        </div>
        <div class="panel" style="margin-top:18px"><div class="actions"><button class="btn primary" onclick="openEntryForm()">Çalışma / Soru Ekle</button><button class="btn primary" onclick="openExamForm()">Deneme Ekle</button><button class="btn primary" onclick="openMistakeForm()">Hata Ekle</button><button class="btn" onclick="openNoteForm()">Not Ekle</button><button class="btn dark" onclick="downloadStudentPdf()">PDF Rapor</button></div></div>
        <div class="grid two" style="margin-top:18px">
          <div class="panel"><h3>Deneme net gelişimi</h3><div class="chart-box"><canvas class="chart" id="examChart"></canvas></div></div>
          <div class="panel"><h3>Derslere göre çözülen soru</h3><div class="chart-box"><canvas class="chart" id="subjectChart"></canvas></div></div>
        </div>
        <div class="grid two" style="margin-top:18px">

    function reportData() {
      const s = student();
      const studentEntries = entries();
      const studentExams = exams();
      const studentMistakes = mistakes();
      const studentNotes = notes();
      const subjectTotals = Object.entries(group(studentEntries, "subject", e => e.total)).sort((a, b) => b[1] - a[1]);
      const topicMistakes = Object.entries(group(studentMistakes, "topic", m => m.count)).sort((a, b) => b[1] - a[1]);
      return { s, studentEntries, studentExams, studentMistakes, studentNotes, subjectTotals, topicMistakes };
    }

    function downloadStudentPdf() {
      const { s, studentExams, studentNotes, subjectTotals, topicMistakes } = reportData();
      if (!s) return;
      if (!window.jspdf?.jsPDF) {
        printStudentReport();
        return;
      }
      const doc = new window.jspdf.jsPDF();
      let y = 16;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text("Öğrenci Gelişim Raporu", 14, y);
      y += 10;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      const lines = [
        `Öğrenci: ${s.name}`,
        `Sınıf / Hedef: ${s.className} - ${s.targetExam}`,
        `Toplam soru: ${fmt(totalQuestions(s.id))}`,
        `Toplam çalışma: ${formatDuration(totalStudyMinutes(s.id))}`,
        `Bu hafta çalışma: ${formatDuration(weekStudyMinutes(s.id))}`,
        `Başarı: %${success(s.id)}`,
        `Son deneme neti: ${studentExams.at(-1) ? examNet(studentExams.at(-1)) : 0}`,
        "",
        "Derslere göre soru:",
        ...(subjectTotals.length ? subjectTotals.map(([name, total]) => `- ${name}: ${fmt(total)} soru`) : ["- Kayıt yok"]),
        "",
        "Son denemeler:",
        ...(studentExams.slice(-5).map(e => `- ${e.date} | ${e.name}: ${examNet(e)} net, ${e.score} puan`) || ["- Kayıt yok"]),
        "",
        "Öne çıkan hata konuları:",
        ...(topicMistakes.length ? topicMistakes.slice(0, 6).map(([name, total]) => `- ${name}: ${total}`) : ["- Kayıt yok"]),
        "",
        "Öğretmen notları:",
        ...(studentNotes.length ? studentNotes.slice(0, 5).map(n => `- ${n.date}: ${n.text}`) : ["- Not yok"])
      ];
      lines.forEach(line => {
        const wrapped = doc.splitTextToSize(String(line), 180);
        if (y + wrapped.length * 7 > 282) {
          doc.addPage();
          y = 16;
        }
        doc.text(wrapped, 14, y);
        y += wrapped.length * 7;
      });
      doc.save(`${s.name.toLocaleLowerCase("tr-TR").replaceAll(" ", "-")}-gelisim-raporu.pdf`);
    }

    function printStudentReport() {
      const { s, studentExams, studentNotes, subjectTotals, topicMistakes } = reportData();
      if (!s) return;
      const win = window.open("", "_blank");
      win.document.write(`
        <html><head><title>${s.name} Gelişim Raporu</title><style>
          body{font-family:Arial,sans-serif;padding:28px;color:#111827}
          h1{font-size:22px} h2{font-size:16px;margin-top:24px}
          table{width:100%;border-collapse:collapse;margin-top:8px}
          th,td{border:1px solid #d1d5db;padding:8px;text-align:left}
          .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
          .box{border:1px solid #d1d5db;border-radius:8px;padding:12px}
        </style></head><body>
          <h1>${s.name} - Öğrenci Gelişim Raporu</h1>
          <p>${s.className} · ${s.targetExam}</p>
          <div class="summary">
            <div class="box"><b>${fmt(totalQuestions(s.id))}</b><br>Toplam soru</div>
            <div class="box"><b>${formatDuration(totalStudyMinutes(s.id))}</b><br>Toplam çalışma</div>
            <div class="box"><b>%${success(s.id)}</b><br>Başarı</div>
          </div>
          <h2>Derslere göre soru</h2>
          <table><tbody>${subjectTotals.map(([name,total]) => `<tr><td>${name}</td><td>${fmt(total)}</td></tr>`).join("") || "<tr><td>Kayıt yok</td></tr>"}</tbody></table>
          <h2>Son denemeler</h2>
          <table><tbody>${studentExams.slice(-5).map(e => `<tr><td>${e.date}</td><td>${e.name}</td><td>${examNet(e)} net</td><td>${e.score} puan</td></tr>`).join("") || "<tr><td>Kayıt yok</td></tr>"}</tbody></table>
          <h2>Hata konuları</h2>
          <table><tbody>${topicMistakes.slice(0, 8).map(([name,total]) => `<tr><td>${name}</td><td>${total}</td></tr>`).join("") || "<tr><td>Kayıt yok</td></tr>"}</tbody></table>
          <h2>Öğretmen notları</h2>
          ${studentNotes.map(n => `<p><b>${n.date}</b><br>${n.text}</p>`).join("") || "<p>Not yok.</p>"}
        </body></html>`);
      win.document.close();
      win.focus();
      win.print();
    }

    function line(id, labels, data, label) {
      if (!window.Chart) return;
      charts.push(new Chart(document.getElementById(id), {
        type: "line",
        data: { labels, datasets: [{ label, data, borderColor: "#c5162b", backgroundColor: "rgba(197,22,43,.12)", fill: true, tension: .35 }] },
        options: { responsive: true, maintainAspectRatio: false }
      }));
    }
    function bar(id, pairs, label) {
      if (!window.Chart) return;
      charts.push(new Chart(document.getElementById(id), {
        type: "bar",
        data: { labels: pairs.map(x => x[0]), datasets: [{ label, data: pairs.map(x => x[1]), backgroundColor: "#38bdf8" }] },
        options: { responsive: true, maintainAspectRatio: false }
      }));
    }

    load().catch(err => {
      document.getElementById("root").innerHTML = `<div style="padding:32px;font-family:system-ui"><h2>Uygulama başlatılamadı</h2><p>${err.message}</p><p>Railway Variables içinde DATABASE_URL olduğundan ve domain portunun 3000 olduğundan emin olun.</p></div>`;
    });
  </script>
</body>
</html>
