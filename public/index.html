<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Başarı Akademi - Öğrenci Takip</title>
  <script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #eef3f9;
      --surface: #ffffff;
      --line: #d4dfed;
      --text: #07162f;
      --muted: #8897b5;
      --primary: #c5162b;
      --primary-dark: #111827;
      --blue: #38bdf8;
      --orange: #ff8b38;
      --green: #009a70;
      --red: #c84e4e;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { display: grid; grid-template-columns: 276px 1fr; min-height: 100vh; }
    .sidebar { position: sticky; top: 0; height: 100vh; background: #fff; border-right: 1px solid var(--line); padding: 16px 14px; overflow: auto; }
    .brand { display: flex; align-items: center; gap: 14px; padding: 12px 10px 18px; margin-bottom: 8px; border-bottom: 1px solid #edf2f8; }
    .brand-logo { width: 64px; height: 64px; object-fit: contain; border-radius: 16px; background: #fff; border: 1px solid #d8e2ef; box-shadow: 0 10px 22px rgba(15, 23, 42, .08); padding: 6px; }
    .brand strong { display: block; font-size: 19px; letter-spacing: .12em; line-height: 1.05; }
    .brand small { display: block; color: #7e8eae; font-weight: 900; letter-spacing: .20em; margin-top: 6px; font-size: 13px; }
    .side-title { font-size: 11px; color: #9aa8c1; margin: 24px 0 9px; text-transform: uppercase; font-weight: 900; letter-spacing: .16em; }
    .nav { display: grid; gap: 7px; }
    .nav button { width: 100%; border: 1px solid transparent; background: transparent; border-radius: 8px; padding: 12px 10px; text-align: left; font-weight: 750; color: #22324d; }
    .nav button.active { background: #fff0f2; border-color: #f3cbd1; color: var(--primary); }
    .main { min-width: 0; }
    .topbar { position: sticky; top: 0; z-index: 5; min-height: 62px; background: #fff; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 8px 30px; }
    .topbar strong { font-size: 20px; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .search { height: 40px; width: min(280px, 28vw); min-width: 190px; display: flex; align-items: center; gap: 8px; border: 1px solid #c6d3e4; background: #eef3fa; border-radius: 8px; padding: 0 12px; }
    .search input { border: 0; outline: 0; background: transparent; width: 100%; }
    .btn { border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--text); padding: 10px 12px; min-height: 40px; font-weight: 850; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
    .btn.dark { background: var(--primary-dark); border-color: var(--primary-dark); color: white; }
    .btn.danger { color: var(--red); border-color: #efcaca; }
    .page { padding: 32px; }
    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(220px, 1fr)); }
    .grid.five { grid-template-columns: repeat(5, minmax(170px, 1fr)); }
    .grid.six { grid-template-columns: repeat(6, minmax(150px, 1fr)); }
    .panel, .stat, .section { background: #fff; border: 1px solid var(--line); border-radius: 12px; }
    .panel, .section { padding: 20px; }
    .stat { padding: 22px; min-height: 150px; display: grid; align-content: space-between; position: relative; overflow: hidden; }
    .stat:after { content: ""; position: absolute; right: -18px; top: -28px; width: 88px; height: 96px; border-radius: 999px; background: var(--blob, #eef2ff); }
    .stat span, .stat strong, .stat small { position: relative; z-index: 1; }
    .stat strong { font-size: 30px; }
    .stat small { color: var(--muted); }
    .section-toolbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 240px)); gap: 16px; }
    .student-card { background: #e7edf5; border: 1px solid #d4dfed; border-top: 3px solid var(--card, #38bdf8); border-radius: 14px; padding: 22px 20px; min-height: 294px; display: grid; gap: 16px; cursor: pointer; transition: transform .16s ease, box-shadow .16s ease; }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 16px 24px rgba(30, 52, 95, .12); }
    .card-top { display: flex; justify-content: space-between; gap: 12px; }
    .avatar { width: 54px; height: 54px; border-radius: 14px; background: var(--card, #38bdf8); color: white; display: grid; place-items: center; font-size: 21px; font-weight: 900; }
    .pill { background: #c9f1e8; color: #008d62; font-size: 12px; font-weight: 900; border-radius: 999px; padding: 4px 11px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .mini { background: white; border-radius: 8px; padding: 10px 11px; min-height: 58px; }
    .mini strong { display: block; color: #009a70; }
    .mini.orange strong { color: #e37000; }
    .mini.dark strong { color: #07162f; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .table-wrap { overflow: auto; }
    .badge { border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 900; background: #eef3f5; color: var(--muted); }
    .good { background: #e5f4eb; color: #008d62; }
    .warn { background: #fff4df; color: #c47a00; }
    .bad { background: #fdebec; color: #c84e4e; }
    .insight-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid var(--line); background: #f8fbff; border-radius: 10px; padding: 14px; min-height: 92px; }
    .insight-card strong { display: block; font-size: 22px; margin-bottom: 6px; }
    .risk-list { display: grid; gap: 10px; }
    .risk-item { border: 1px solid #f0cdd1; background: #fff7f8; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .risk-item.low { border-color: #d9eadf; background: #f5fbf7; }
    .risk-item.medium { border-color: #f3dfb8; background: #fffaf0; }
    .topic-map { display: flex; flex-wrap: wrap; gap: 10px; }
    .topic-chip { border: 1px solid var(--line); border-radius: 999px; padding: 9px 12px; font-weight: 850; background: #f8fbff; }
    .topic-chip.good { border-color: #bee5cd; background: #effaf3; color: #00754f; }
    .topic-chip.warn { border-color: #f0d491; background: #fff8e8; color: #9a6500; }
    .topic-chip.bad { border-color: #e9b8be; background: #fff1f3; color: #b2182b; }
    .comment-list { display: grid; gap: 10px; }
    .comment-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px; background: #fff; }
    .comment-card p { margin: 6px 0 0; }
    .desk-grid { display: grid; grid-template-columns: minmax(260px, .9fr) minmax(280px, 1.1fr) minmax(280px, 1fr); gap: 16px; align-items: stretch; }
    .timer-face { min-height: 118px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 12px; background: #f8fbff; margin: 12px 0; }
    .timer-face strong { font-size: 42px; letter-spacing: .02em; }
    .segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .segmented button { min-height: 34px; padding: 7px 8px; }
    .calendar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .calendar-grid span { min-height: 34px; display: grid; place-items: center; border-radius: 8px; font-weight: 800; font-size: 12px; }
    .calendar-grid .weekday { min-height: 24px; color: var(--muted); background: transparent; }
    .calendar-grid .day { background: #f8fbff; border: 1px solid #e3ebf5; }
    .calendar-grid .today { background: #fff1f3; border-color: #e9b8be; color: var(--primary); }
    .calendar-grid .has-entry { box-shadow: inset 0 -3px 0 #38bdf8; }
    .countdown-list { display: grid; gap: 8px; margin-top: 12px; }
    .countdown-item { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: #f8fbff; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .countdown-item strong { font-size: 22px; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .wide { grid-column: span 2; }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 900; }
    .field input, .field select, .field textarea { border: 1px solid var(--line); border-radius: 8px; padding: 11px; background: #fff; min-height: 42px; width: 100%; }
    textarea { min-height: 96px; resize: vertical; }
    .chart-box { position: relative; height: 280px; min-height: 280px; max-height: 280px; width: 100%; overflow: hidden; }
    .chart-box canvas { display: block; width: 100% !important; height: 100% !important; max-height: 280px !important; }
    .chart { display: block; width: 100% !important; height: 100% !important; max-height: 280px !important; }
    .student-card.archived { opacity: .72; filter: grayscale(.35); }
    .modal { position: fixed; inset: 0; background: rgba(12, 20, 28, .42); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 50; }
    .modal.open { display: flex; }
    .modal-box { width: min(900px, 100%); max-height: 88vh; overflow: auto; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .mobile-menu { display: none; }
    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; z-index: 20; transform: translateX(-100%); transition: .2s; width: min(310px, 88vw); }
      .sidebar.open { transform: translateX(0); }
      .mobile-menu { display: inline-flex; }
      .grid.six, .grid.five, .grid.four, .grid.three, .grid.two { grid-template-columns: 1fr 1fr; }
      .desk-grid { grid-template-columns: 1fr; }
      .insight-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .page { padding: 18px; }
      .search { display: none; }
    }
    @media (max-width: 680px) {
      .grid.six, .grid.five, .grid.four, .grid.three, .grid.two, .form-grid { grid-template-columns: 1fr; }
      .insight-grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .topbar { padding: 10px 14px; }
      .cards { grid-template-columns: 1fr; }
      .student-card { min-height: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="btn" onclick="closeModal()">Kapat</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  <script>
    const api = {
      async req(path, options = {}) {
        const res = await fetch(path, {
          ...options,
          headers: { "Content-Type": "application/json", ...(options.headers || {}) }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "İşlem tamamlanamadı.");
        return data;
      }
    };

    let state = { students: [], subjects: [], entries: [], exams: [], mistakes: [], notes: [], readings: [], upcomingExams: [] };
    let activeStudentId = localStorage.getItem("activeStudentId") || "";
    let page = "dashboard";
    let contentEl = null;
    let charts = [];
    let pomodoroSeconds = Number(localStorage.getItem("pomodoroSeconds") || 25 * 60);
    let pomodoroMode = localStorage.getItem("pomodoroMode") || "Odak";
    let pomodoroTimer = null;
    let countdowns = JSON.parse(localStorage.getItem("dashboardCountdowns") || "[]");

    const colors = ["#38bdf8", "#4f83f1", "#ff8b38", "#32b8e8", "#c5162b"];
    const middleSchoolSubjects = ["Matematik", "Türkçe", "Din Kültürü", "İngilizce", "Sosyal Bilimler", "Fen Bilimleri"];
    const classOptions = ["5/A", "5/B", "5/C", "6/A", "6/B", "6/C", "7/A", "7/B", "7/C", "8/A", "8/B", "8/C"];
    const mistakeTypes = ["Bilgi eksikliği", "Dikkatsizlik", "İşlem hatası", "Konuyu karıştırma", "Süre yetişmedi", "Soruyu yanlış okuma", "Yorum hatası"];

    function today(offset = 0) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().slice(0, 10);
    }
    function fmt(n) { return Number(n || 0).toLocaleString("tr-TR"); }
    function pad(n) { return String(n).padStart(2, "0"); }
    function net(c, w) { return +(Number(c) - Number(w) / 3).toFixed(2); }
    function examNet(e) { return +(e.details || []).reduce((s, d) => s + net(d.correct, d.wrong), 0).toFixed(2); }
    function initials(n) { return n.split(" ").map(x => x[0]).join("").slice(0, 2).toLocaleUpperCase("tr-TR"); }
    function entries(id = activeStudentId) { return state.entries.filter(e => e.studentId === id); }
    function exams(id = activeStudentId) { return state.exams.filter(e => e.studentId === id); }
    function mistakes(id = activeStudentId) { return state.mistakes.filter(e => e.studentId === id); }
    function notes(id = activeStudentId) { return state.notes.filter(e => e.studentId === id); }
    function readings(id = activeStudentId) { return state.readings.filter(e => e.studentId === id); }
    function activeStudents() { return state.students.filter(s => !s.archived); }
    function archivedStudents() { return state.students.filter(s => s.archived); }
    function student() { return state.students.find(s => s.id === activeStudentId) || state.students[0]; }
    function totalQuestions(id) { return entries(id).reduce((s, e) => s + Number(e.total), 0); }
    function totalStudyMinutes(id) { return entries(id).reduce((s, e) => s + Number(e.studyMinutes || 0), 0); }
    function totalReadingPages(id) { return readings(id).reduce((s, e) => s + Number(e.pages || 0), 0); }
    function formatDuration(minutes) {
      const h = Math.floor(Number(minutes || 0) / 60);
      const m = Number(minutes || 0) % 60;
      return h ? `${h} sa ${m} dk` : `${m} dk`;
    }
    function formatClock(seconds) {
      return `${pad(Math.floor(seconds / 60))}:${pad(seconds % 60)}`;
    }
    function savePomodoro() {
      localStorage.setItem("pomodoroSeconds", pomodoroSeconds);
      localStorage.setItem("pomodoroMode", pomodoroMode);
    }
    function renderPomodoroClock() {
      const el = document.getElementById("pomodoroClock");
      const mode = document.getElementById("pomodoroMode");
      if (el) el.textContent = formatClock(pomodoroSeconds);
      if (mode) mode.textContent = pomodoroMode;
    }
    function setPomodoro(minutes, mode) {
      stopPomodoro();
      pomodoroSeconds = minutes * 60;
      pomodoroMode = mode;
      savePomodoro();
      renderPomodoroClock();
    }
    function startPomodoro() {
      if (pomodoroTimer) return;
      pomodoroTimer = setInterval(() => {
        pomodoroSeconds = Math.max(0, pomodoroSeconds - 1);
        savePomodoro();
        renderPomodoroClock();
        if (pomodoroSeconds === 0) stopPomodoro();
      }, 1000);
    }
    function stopPomodoro() {
      clearInterval(pomodoroTimer);
      pomodoroTimer = null;
    }
    function resetPomodoro() {
      setPomodoro(pomodoroMode === "Kısa Mola" ? 5 : pomodoroMode === "Uzun Mola" ? 15 : 25, pomodoroMode);
    }
    function daysUntil(date) {
      const diff = dateAtNoon(date) - dateAtNoon(today());
      return Math.max(0, Math.ceil(diff / 86400000));
    }
    function planningLgsDate() {
      const now = dateAtNoon(today());
      let year = now.getMonth() >= 5 ? now.getFullYear() + 1 : now.getFullYear();
      return `${year}-06-01`;
    }
    function autoCountdowns() {
      const endOfWeek = weekStart(0);
      endOfWeek.setDate(endOfWeek.getDate() + 6);
      const monthEnd = dateAtNoon(today());
      monthEnd.setMonth(monthEnd.getMonth() + 1, 0);
      countdowns = [
        { name: "Hafta hedefi", date: endOfWeek.toISOString().slice(0, 10) },
        { name: "Ay sonu değerlendirme", date: monthEnd.toISOString().slice(0, 10) },
        { name: "LGS çalışma hedefi", date: planningLgsDate() },
        ...state.upcomingExams.slice(0, 3).map(e => ({ name: e.name, date: e.date }))
      ];
      localStorage.setItem("dashboardCountdowns", JSON.stringify(countdowns));
      renderPage();
    }
    function saveCountdowns() {
      localStorage.setItem("dashboardCountdowns", JSON.stringify(countdowns));
    }
    function addCountdown(ev) {
      ev.preventDefault();
      const f = Object.fromEntries(new FormData(ev.target));
      countdowns.push({ name: f.name, date: f.date });
      countdowns.sort((a, b) => a.date.localeCompare(b.date));
      saveCountdowns();
      renderPage();
    }
    function deleteCountdown(index) {
      countdowns.splice(index, 1);
      saveCountdowns();
      renderPage();
    }
    function renderCountdowns() {
      if (!countdowns.length) return `<p class="muted">Sayaç oluşturmak için otomatik butona basın.</p>`;
      return `<div class="countdown-list">${countdowns.map((c, i) => `<div class="countdown-item"><div><b>${c.name}</b><div class="muted">${new Date(c.date + "T12:00").toLocaleDateString("tr-TR")}</div></div><div class="actions"><strong>${daysUntil(c.date)} gün</strong><button class="btn danger" onclick="deleteCountdown(${i})">Sil</button></div></div>`).join("")}</div>`;
    }
    function renderMiniCalendar() {
      const now = dateAtNoon(today());
      const year = now.getFullYear();
      const month = now.getMonth();
      const first = new Date(year, month, 1);
      const firstDay = (first.getDay() + 6) % 7;
      const days = new Date(year, month + 1, 0).getDate();
      const entryDays = new Set(state.entries.filter(e => {
        const d = dateAtNoon(e.date);
        return d.getFullYear() === year && d.getMonth() === month;
      }).map(e => Number(e.date.slice(8, 10))));
      const blanks = Array.from({ length: firstDay }, () => `<span></span>`).join("");
      const cells = Array.from({ length: days }, (_, i) => {
        const day = i + 1;
        const classes = ["day", day === now.getDate() ? "today" : "", entryDays.has(day) ? "has-entry" : ""].filter(Boolean).join(" ");
        return `<span class="${classes}">${day}</span>`;
      }).join("");
      return `<div class="calendar-head"><b>${now.toLocaleDateString("tr-TR", { month: "long", year: "numeric" })}</b><span class="badge good">${entryDays.size} kayıtlı gün</span></div>
        <div class="calendar-grid">${["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"].map(d => `<span class="weekday">${d}</span>`).join("")}${blanks}${cells}</div>`;
    }
    function success(id) {
      const es = entries(id);
      const correct = es.reduce((s, e) => s + Number(e.correct), 0);
      const total = es.reduce((s, e) => s + Number(e.total), 0);
      return total ? Math.round(correct / total * 100) : 0;
    }
    function weekTotal(id) {
      const start = new Date();
      start.setDate(start.getDate() - start.getDay() + 1);
      return entries(id).filter(e => new Date(e.date + "T12:00") >= start).reduce((s, e) => s + Number(e.total), 0);
    }
    function weekStudyMinutes(id) {
      const start = new Date();
      start.setDate(start.getDate() - start.getDay() + 1);
      return entries(id).filter(e => new Date(e.date + "T12:00") >= start).reduce((s, e) => s + Number(e.studyMinutes || 0), 0);
    }
    function lastLabel(e) {
      if (!e) return "Yok";
      const diff = Math.floor((new Date(today() + "T12:00") - new Date(e.date + "T12:00")) / 86400000);
      return diff <= 0 ? "Bugün" : `${diff}g önce`;
    }
    function group(list, key, val = x => 1) {
      return list.reduce((a, x) => {
        a[x[key]] = (a[x[key]] || 0) + Number(val(x));
        return a;
      }, {});
    }
    function dateAtNoon(value) {
      return new Date(`${value}T12:00`);
    }
    function weekStart(offset = 0) {
      const d = dateAtNoon(today());
      d.setDate(d.getDate() - d.getDay() + 1 + offset * 7);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function weeklyStats(id, offset = 0) {
      const start = weekStart(offset);
      const end = new Date(start);
      end.setDate(end.getDate() + 7);
      const list = entries(id).filter(e => {
        const d = dateAtNoon(e.date);
        return d >= start && d < end;
      });
      const total = list.reduce((s, e) => s + Number(e.total), 0);
      const study = list.reduce((s, e) => s + Number(e.studyMinutes || 0), 0);
      const correct = list.reduce((s, e) => s + Number(e.correct), 0);
      const wrong = list.reduce((s, e) => s + Number(e.wrong), 0);
      const blank = list.reduce((s, e) => s + Number(e.blank), 0);
      const st = state.students.find(s => s.id === id);
      const goal = Number(st?.weeklyGoal || 0);
      const progress = goal ? Math.min(999, Math.round(total / goal * 100)) : 0;
      return { total, study, correct, wrong, blank, days: new Set(list.map(e => e.date)).size, success: total ? Math.round(correct / total * 100) : 0, goal, progress };
    }
    function weeklyReport(id) {
      const current = weeklyStats(id, 0);
      const previous = weeklyStats(id, -1);
      const diff = current.total - previous.total;
      const status = current.progress >= 100 ? "Hedef tamamlandı" : current.progress >= 70 ? "İyi gidiyor" : current.progress >= 40 ? "Takip edilmeli" : "Riskli";
      return { current, previous, diff, status };
    }
    function riskSignals(id) {
      const st = state.students.find(s => s.id === id);
      const w = weeklyReport(id);
      const list = [];
      const recent = entries(id).sort((a, b) => b.date.localeCompare(a.date))[0];
      const days = recent ? Math.floor((dateAtNoon(today()) - dateAtNoon(recent.date)) / 86400000) : 999;
      if (days >= 3) list.push({ level: "high", title: "Kayıt arası açıldı", text: days === 999 ? "Henüz çalışma kaydı yok." : `${days} gündür yeni çalışma kaydı yok.` });
      if (w.current.goal && w.current.progress < 50) list.push({ level: "high", title: "Haftalık hedef geride", text: `Hedefin yalnızca %${w.current.progress} kadarı tamamlandı.` });
      else if (w.current.goal && w.current.progress < 80) list.push({ level: "medium", title: "Hedef yakından izlenmeli", text: `Haftalık hedef tamamlanma oranı %${w.current.progress}.` });
      if (w.previous.total > 0 && w.diff < -100) list.push({ level: "medium", title: "Soru sayısında düşüş", text: `Geçen haftaya göre ${fmt(Math.abs(w.diff))} soru daha az.` });
      const ex = exams(id);
      if (ex.length >= 2) {
        const last = examNet(ex.at(-1));
        const prev = examNet(ex.at(-2));
        if (last < prev) list.push({ level: "medium", title: "Deneme neti düştü", text: `Son deneme ${+(prev - last).toFixed(2)} net daha düşük.` });
      }
      const repeated = Object.entries(group(mistakes(id), "topic", m => m.count)).sort((a, b) => b[1] - a[1])[0];
      if (repeated && repeated[1] >= 4) list.push({ level: "high", title: "Tekrarlayan konu hatası", text: `${repeated[0]} konusunda ${fmt(repeated[1])} hata kaydı var.` });
      if (!list.length) list.push({ level: "low", title: "Takip dengeli", text: `${st?.name || "Öğrenci"} için şu anda belirgin risk görünmüyor.` });
      return list;
    }
    function topicMap(id) {
      const mistakeMap = group(mistakes(id), "topic", m => m.count);
      const entryMap = entries(id).reduce((a, e) => {
        a[e.topic] ||= { total: 0, correct: 0, subject: e.subject };
        a[e.topic].total += Number(e.total);
        a[e.topic].correct += Number(e.correct);
        return a;
      }, {});
      const names = [...new Set([...Object.keys(mistakeMap), ...Object.keys(entryMap)])];
      return names.map(name => {
        const solved = entryMap[name]?.total || 0;
        const accuracy = solved ? Math.round((entryMap[name].correct || 0) / solved * 100) : 0;
        const errors = mistakeMap[name] || 0;
        const level = errors >= 4 || (solved >= 20 && accuracy < 55) ? "bad" : errors >= 2 || (solved >= 20 && accuracy < 70) ? "warn" : "good";
        return { name, solved, accuracy, errors, level, subject: entryMap[name]?.subject || "" };
      }).sort((a, b) => {
        const rank = { bad: 0, warn: 1, good: 2 };
        return rank[a.level] - rank[b.level] || b.errors - a.errors;
      });
    }
    function examInsight(exam, all = exams(exam.studentId)) {
      const ordered = all.slice().sort((a, b) => a.date.localeCompare(b.date));
      const index = ordered.findIndex(e => e.id === exam.id);
      const previous = index > 0 ? ordered[index - 1] : null;
      const currentNet = examNet(exam);
      const pieces = [];
      if (previous) {
        const diff = +(currentNet - examNet(previous)).toFixed(2);
        pieces.push(diff >= 0 ? `Önceki denemeye göre ${diff} net artış var.` : `Önceki denemeye göre ${Math.abs(diff)} net düşüş var.`);
      } else {
        pieces.push("Bu deneme karşılaştırma için başlangıç verisi olarak kullanılabilir.");
      }
      const weak = (exam.details || []).map(d => ({ subject: d.subject, rate: Number(d.total) ? Math.round(Number(d.correct) / Number(d.total) * 100) : 0, net: net(d.correct, d.wrong) })).sort((a, b) => a.rate - b.rate)[0];
      if (weak) pieces.push(`${weak.subject} dersinde başarı oranı %${weak.rate}; bu alan tekrar planına alınmalı.`);
      const blanks = (exam.details || []).reduce((s, d) => s + Number(d.blank || 0), 0);
      if (blanks >= 5) pieces.push(`Boş sayısı ${blanks}; süre yönetimi ayrıca kontrol edilmeli.`);
      return pieces.join(" ");
    }
    function reportNarrative(id) {
      const st = state.students.find(s => s.id === id);
      const w = weeklyReport(id);
      const risks = riskSignals(id).filter(r => r.level !== "low");
      const topics = topicMap(id).filter(t => t.level !== "good").slice(0, 3);
      const ex = exams(id);
      const last = ex.at(-1);
      return [
        `${st?.name || "Öğrenci"} bu hafta ${fmt(w.current.total)} soru ve ${formatDuration(w.current.study)} çalışma kaydıyla haftalık hedefinin %${w.current.progress} seviyesinde.`,
        `Toplam kitap okuma kaydı ${fmt(totalReadingPages(id))} sayfa olarak görünüyor.`,
        w.diff >= 0 ? `Soru sayısı geçen haftaya göre ${fmt(w.diff)} arttı.` : `Soru sayısı geçen haftaya göre ${fmt(Math.abs(w.diff))} azaldı.`,
        risks.length ? `Öncelikli takip nedeni: ${risks[0].title.toLocaleLowerCase("tr-TR")}.` : "Düzenli takip açısından belirgin bir risk görünmüyor.",
        topics.length ? `Öne çıkan eksik konular: ${topics.map(t => t.name).join(", ")}.` : "Konu haritasında kritik eksik görünmüyor.",
        last ? `Son deneme yorumu: ${examInsight(last, ex)}` : "Deneme yorumu için henüz kayıt girilmemiş."
      ];
    }
    function renderWeeklyCard(id) {
      const r = weeklyReport(id);

      return `<div class="panel">

    }

    function renderTopicMap(id) {
      const topics = topicMap(id);
      if (!topics.length) return `<p class="muted">Konu haritası için çalışma veya hata kaydı ekleyin.</p>`;

    function renderExamComments(id) {

    }

    async function saveStudent(ev, id) {
      ev.preventDefault();
      const btn = document.getElementById("studentSaveBtn");
      const error = document.getElementById("studentFormError");
      if (error) {
        error.style.display = "none";
        error.textContent = "";
      }
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Kaydediliyor...";
      }
      const body = Object.fromEntries(new FormData(ev.target));
      ["targetNet", "targetScore", "weeklyGoal"].forEach(k => body[k] = Number(body[k]));
      try {
        await api.req(id ? `/api/students/${id}` : "/api/students", { method: id ? "PUT" : "POST", body: JSON.stringify(body) });
        closeModal();
        await load();
      } catch (err) {
        if (error) {
          error.textContent = err.message || "Öğrenci kaydedilemedi.";
          error.style.display = "block";
        } else {
          alert(err.message || "Öğrenci kaydedilemedi.");
        }
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Kaydet";
        }
      }
    }

      const studentNotes = notes();
      const studentReadings = readings();
      const subjectTotals = Object.entries(group(studentEntries, "subject", e => e.total)).sort((a, b) => b[1] - a[1]);
      const topicMistakes = Object.entries(group(studentMistakes, "topic", m => m.count)).sort((a, b) => b[1] - a[1]);
      return { s, studentEntries, studentExams, studentMistakes, studentNotes, studentReadings, subjectTotals, topicMistakes };
    }

    function htmlSafe(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[ch]));
    }
    function reportSlug(name) {
      return String(name || "ogrenci").toLocaleLowerCase("tr-TR").replace(/\s+/g, "-");
    }
    function svgNoData(text = "Kayıt yok") {
      return `<div class="chart-empty">${htmlSafe(text)}</div>`;
    }
    function barReportChart(pairs, label, color = "#38bdf8") {
      const data = pairs.slice(0, 8).filter(([, value]) => Number(value) > 0);
      if (!data.length) return svgNoData();
      const width = 760, height = 280, left = 64, right = 24, top = 24, bottom = 56;
      const max = Math.max(...data.map(([, value]) => Number(value)), 1);
      const plotW = width - left - right;
      const plotH = height - top - bottom;
      const gap = 16;
      const barW = Math.max(28, (plotW - gap * (data.length - 1)) / data.length);
      const bars = data.map(([name, value], i) => {
        const x = left + i * (barW + gap);
        const h = Math.max(3, Number(value) / max * plotH);
        const y = top + plotH - h;
        const shortName = String(name).length > 14 ? String(name).slice(0, 13) + "." : String(name);
        return `
          <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="8" fill="${color}"></rect>
          <text x="${x + barW / 2}" y="${y - 8}" text-anchor="middle" class="value">${fmt(value)}</text>
          <text x="${x + barW / 2}" y="${height - 26}" text-anchor="middle" class="axis">${htmlSafe(shortName)}</text>
        `;
      }).join("");
      return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${htmlSafe(label)}">
        <line x1="${left}" y1="${top + plotH}" x2="${width - right}" y2="${top + plotH}" stroke="#d7dfeb"></line>
        <line x1="${left}" y1="${top}" x2="${left}" y2="${top + plotH}" stroke="#d7dfeb"></line>
        ${bars}
      </svg>`;
    }
    function lineReportChart(examsList) {
      const data = examsList.slice(-8).map(e => ({ label: e.name, value: examNet(e) }));
      if (!data.length) return svgNoData("Deneme kaydı yok");
      const width = 760, height = 280, left = 64, right = 26, top = 24, bottom = 56;
      const values = data.map(d => Number(d.value) || 0);
      const min = Math.min(0, ...values);
      const max = Math.max(...values, 1);
      const range = Math.max(max - min, 1);
      const plotW = width - left - right;
      const plotH = height - top - bottom;
      const xAt = i => left + (data.length === 1 ? plotW / 2 : i * (plotW / (data.length - 1)));
      const yAt = value => top + plotH - ((Number(value) - min) / range * plotH);
      const points = data.map((d, i) => `${xAt(i)},${yAt(d.value)}`).join(" ");
      const area = `${left},${top + plotH} ${points} ${width - right},${top + plotH}`;
      const dots = data.map((d, i) => {
        const x = xAt(i);
        const y = yAt(d.value);
        const shortName = String(d.label).length > 14 ? String(d.label).slice(0, 13) + "." : String(d.label);
        return `
          <circle cx="${x}" cy="${y}" r="5" fill="#c5162b" stroke="#fff" stroke-width="2"></circle>
          <text x="${x}" y="${y - 10}" text-anchor="middle" class="value">${d.value}</text>
          <text x="${x}" y="${height - 26}" text-anchor="middle" class="axis">${htmlSafe(shortName)}</text>
        `;
      }).join("");
      return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Deneme net gelişimi">
        <line x1="${left}" y1="${top + plotH}" x2="${width - right}" y2="${top + plotH}" stroke="#d7dfeb"></line>
        <line x1="${left}" y1="${top}" x2="${left}" y2="${top + plotH}" stroke="#d7dfeb"></line>
        <polygon points="${area}" fill="rgba(197,22,43,.12)"></polygon>
        <polyline points="${points}" fill="none" stroke="#c5162b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
        ${dots}
      </svg>`;
    }

    function downloadStudentPdf() {
      printStudentReport();
    }

    function printStudentReport() {
      const { s, studentExams, studentNotes, studentReadings, subjectTotals, topicMistakes } = reportData();
      if (!s) return;
      const today = new Date().toLocaleDateString("tr-TR", { day: "2-digit", month: "long", year: "numeric" });
      const safeName = htmlSafe(s.name);
      const weekly = weeklyReport(s.id);
      const narrativeRows = reportNarrative(s.id).map(text => `<li>${htmlSafe(text)}</li>`).join("");
      const riskRows = riskSignals(s.id).map(r => `<tr><td>${htmlSafe(r.title)}</td><td>${htmlSafe(r.text)}</td><td>${r.level === "low" ? "İyi" : r.level === "medium" ? "İzle" : "Risk"}</td></tr>`).join("");
      const topicRows = topicMap(s.id).slice(0, 12).map(t => `<tr><td>${htmlSafe(t.name)}</td><td>${t.level === "bad" ? "Eksik" : t.level === "warn" ? "Tekrar gerekli" : "Güçlü"}</td><td>${fmt(t.errors)} hata</td><td>${t.solved ? `%${t.accuracy}` : "-"}</td></tr>`).join("") || `<tr><td colspan="4">Kayıt yok</td></tr>`;
      const readingRows = studentReadings.slice(0, 12).map(r => `<tr><td>${htmlSafe(r.date)}</td><td>${htmlSafe(r.bookTitle)}</td><td>${fmt(r.pages)} sayfa</td><td>${htmlSafe(r.note || "")}</td></tr>`).join("") || `<tr><td colspan="4">Kayıt yok</td></tr>`;
      const examRows = studentExams.slice(-8).reverse().map(e => `
        <tr><td>${htmlSafe(e.date)}</td><td>${htmlSafe(e.name)}</td><td>${examNet(e)} net</td><td>${fmt(e.score)} puan</td><td>${htmlSafe(examInsight(e))}</td></tr>
      `).join("") || `<tr><td colspan="5">Kayıt yok</td></tr>`;
      const subjectRows = subjectTotals.map(([name, total]) => `<tr><td>${htmlSafe(name)}</td><td>${fmt(total)} soru</td></tr>`).join("") || `<tr><td colspan="2">Kayıt yok</td></tr>`;
      const mistakeRows = topicMistakes.slice(0, 10).map(([name, total]) => `<tr><td>${htmlSafe(name)}</td><td>${fmt(total)} hata</td></tr>`).join("") || `<tr><td colspan="2">Kayıt yok</td></tr>`;
      const noteRows = studentNotes.slice(0, 8).map(n => `<div class="note"><strong>${htmlSafe(n.date)}</strong><p>${htmlSafe(n.text)}</p></div>`).join("") || `<p class="muted">Not yok.</p>`;
      const win = window.open("", "_blank");
      if (!win) {
        alert("Rapor penceresi açılamadı. Tarayıcıda açılır pencere iznini kontrol edin.");
        return;
      }
      win.document.write(`
        <!doctype html>
        <html lang="tr">
        <head>
          <meta charset="utf-8">
          <title>${safeName} Gelişim Raporu</title>
          <style>
            @page { size: A4; margin: 14mm; }
            * { box-sizing: border-box; }
            body { margin: 0; background: #eef3f9; color: #07162f; font-family: Arial, "Segoe UI", sans-serif; }
            .report { max-width: 980px; margin: 0 auto; background: #fff; padding: 28px; }
            .header { display: flex; align-items: center; justify-content: space-between; gap: 22px; border-bottom: 2px solid #dbe5f2; padding-bottom: 18px; }
            .identity { display: flex; align-items: center; gap: 16px; }
            .logo { width: 68px; height: 68px; object-fit: contain; border: 1px solid #dbe5f2; border-radius: 12px; padding: 6px; }
            h1 { margin: 0; font-size: 28px; line-height: 1.15; }
            h2 { margin: 0 0 14px; font-size: 18px; }
            .muted, .label { color: #7484a3; }
            .date { text-align: right; font-size: 13px; color: #7484a3; }
            .student { margin-top: 18px; display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 10px; }
            .student .cell, .metric { border: 1px solid #dbe5f2; border-radius: 10px; padding: 12px; background: #f8fbff; }
            .label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
            .value { font-weight: 800; fill: #07162f; font-size: 13px; }
            .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
            .metric strong { display: block; font-size: 22px; margin-bottom: 8px; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 18px; }
            .section { border: 1px solid #dbe5f2; border-radius: 12px; padding: 16px; break-inside: avoid; background: #fff; }
            .wide { grid-column: 1 / -1; }
            svg { display: block; width: 100%; height: auto; }
            .axis { fill: #526176; font-size: 12px; }
            .chart-empty { min-height: 170px; display: grid; place-items: center; border: 1px dashed #cdd8e8; border-radius: 10px; color: #7484a3; }
            table { width: 100%; border-collapse: collapse; font-size: 13px; }
            th, td { border-bottom: 1px solid #e5ecf5; padding: 9px 8px; text-align: left; vertical-align: top; }
            th { color: #526176; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
            .note { border: 1px solid #e5ecf5; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: #fbfdff; }
            .note p { margin: 5px 0 0; }
            .analysis { margin: 12px 0 0; padding-left: 19px; line-height: 1.5; }
            .status { display: inline-block; border-radius: 999px; padding: 5px 9px; background: #fff4df; color: #9a6500; font-weight: 700; font-size: 12px; }
            .footer { margin-top: 18px; padding-top: 12px; border-top: 1px solid #dbe5f2; color: #7484a3; font-size: 12px; display: flex; justify-content: space-between; }
            @media print {
              body { background: #fff; }
              .report { padding: 0; max-width: none; }
              .section, .metric, .student .cell { break-inside: avoid; }
            }
          </style>
        </head>
        <body>
          <main class="report">
            <header class="header">
              <div class="identity">
                <img class="logo" src="/mg-logo.png" alt="MG">
                <div>
                  <h1>Öğrenci Gelişim Raporu</h1>
                  <div class="muted">Başarı Akademi öğrenci takip özeti</div>
                </div>
              </div>
              <div class="date">Rapor tarihi<br><strong>${today}</strong></div>
            </header>
            <section class="student">
              <div class="cell"><span class="label">Öğrenci</span><strong>${safeName}</strong></div>
              <div class="cell"><span class="label">Sınıf</span><strong>${htmlSafe(s.className)}</strong></div>
              <div class="cell"><span class="label">Hedef sınav</span><strong>${htmlSafe(s.targetExam)}</strong></div>
            </section>
            <section class="metrics">
              <div class="metric"><strong>${fmt(totalQuestions(s.id))}</strong><span class="label">Toplam soru</span></div>
              <div class="metric"><strong>${formatDuration(totalStudyMinutes(s.id))}</strong><span class="label">Toplam çalışma</span></div>
              <div class="metric"><strong>${fmt(totalReadingPages(s.id))}</strong><span class="label">Okunan sayfa</span></div>
              <div class="metric"><strong>${formatDuration(weekStudyMinutes(s.id))}</strong><span class="label">Bu hafta çalışma</span></div>
              <div class="metric"><strong>%${success(s.id)}</strong><span class="label">Başarı</span></div>
              <div class="metric"><strong>${studentExams.at(-1) ? examNet(studentExams.at(-1)) : 0}</strong><span class="label">Son deneme neti</span></div>
            </section>
            <section class="grid">
              <div class="section wide">
                <h2>Otomatik Değerlendirme</h2>
                <ul class="analysis">${narrativeRows}</ul>
              </div>
              <div class="section">
                <h2>Haftalık Takip Karnesi <span class="status">${htmlSafe(weekly.status)}</span></h2>
                <table><tbody>
                  <tr><td>Haftalık hedef</td><td>${fmt(weekly.current.goal)} soru</td></tr>
                  <tr><td>Bu hafta soru</td><td>${fmt(weekly.current.total)} soru</td></tr>
                  <tr><td>Hedef tamamlanma</td><td>%${weekly.current.progress}</td></tr>
                  <tr><td>Bu hafta çalışma</td><td>${formatDuration(weekly.current.study)}</td></tr>
                  <tr><td>Geçen haftaya göre</td><td>${weekly.diff >= 0 ? "+" : "-"}${fmt(Math.abs(weekly.diff))} soru</td></tr>
                </tbody></table>
              </div>
              <div class="section">
                <h2>Risk ve Müdahale Uyarıları</h2>
                <table><thead><tr><th>Başlık</th><th>Açıklama</th><th>Durum</th></tr></thead><tbody>${riskRows}</tbody></table>
              </div>
            </section>
            <section class="grid">
              <div class="section wide">
                <h2>Deneme Net Gelişimi</h2>
                ${lineReportChart(studentExams)}
              </div>
              <div class="section">
                <h2>Derslere Göre Çözülen Soru</h2>
                ${barReportChart(subjectTotals, "Derslere göre çözülen soru")}
              </div>
              <div class="section">
                <h2>Konu Bazlı Hata</h2>
                ${barReportChart(topicMistakes, "Konu bazlı hata", "#c5162b")}
              </div>
              <div class="section">
                <h2>Ders Özeti</h2>
                <table><thead><tr><th>Ders</th><th>Soru</th></tr></thead><tbody>${subjectRows}</tbody></table>
              </div>
              <div class="section">
                <h2>Konu Eksik Haritası</h2>
                <table><thead><tr><th>Konu</th><th>Durum</th><th>Hata</th><th>Başarı</th></tr></thead><tbody>${topicRows}</tbody></table>
              </div>
              <div class="section">
                <h2>Kitap Okuma Takibi</h2>
                <table><thead><tr><th>Tarih</th><th>Kitap</th><th>Sayfa</th><th>Not</th></tr></thead><tbody>${readingRows}</tbody></table>
              </div>
              <div class="section">
                <h2>Son Denemeler</h2>
                <table><thead><tr><th>Tarih</th><th>Deneme</th><th>Net</th><th>Puan</th><th>Yorum</th></tr></thead><tbody>${examRows}</tbody></table>
              </div>
              <div class="section">
                <h2>Hata Konuları</h2>
                <table><thead><tr><th>Konu</th><th>Hata</th></tr></thead><tbody>${mistakeRows}</tbody></table>
              </div>
              <div class="section">
                <h2>Öğretmen Notları</h2>
                ${noteRows}
              </div>
            </section>
            <footer class="footer">
              <span>${safeName} için hazırlanmıştır.</span>
              <span>Başarı Akademi</span>
            </footer>
          </main>
        </body>
        </html>`);
      win.document.close();
      win.focus();
      setTimeout(() => {
        win.document.title = `${reportSlug(s.name)}-gelisim-raporu`;
        win.print();
      }, 350);
    }

    function line(id, labels, data, label) {
      if (!window.Chart) return;
      charts.push(new Chart(document.getElementById(id), {
        type: "line",
        data: { labels, datasets: [{ label, data, borderColor: "#c5162b", backgroundColor: "rgba(197,22,43,.12)", fill: true, tension: .35 }] },
        options: { responsive: true, maintainAspectRatio: false }
      }));
    }
    function bar(id, pairs, label) {
      if (!window.Chart) return;
      charts.push(new Chart(document.getElementById(id), {
        type: "bar",
        data: { labels: pairs.map(x => x[0]), datasets: [{ label, data: pairs.map(x => x[1]), backgroundColor: "#38bdf8" }] },
        options: { responsive: true, maintainAspectRatio: false }
      }));
    }

    load().catch(err => {
      document.getElementById("root").innerHTML = `<div style="padding:32px;font-family:system-ui"><h2>Uygulama başlatılamadı</h2><p>${err.message}</p><p>Railway Variables içinde DATABASE_URL olduğundan ve domain portunun 3000 olduğundan emin olun.</p></div>`;
    });
  </script>
</body>
</html>
